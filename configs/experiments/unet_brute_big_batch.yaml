# @package _global_

# Larger batch + matching higher LR (linear scaling). Tests whether more stable
# gradients at batch=128 outperform the noisier batch=64 baseline on this loss
# surface.

defaults:
  - override /model: unet

exp_name: unet_brute_big_batch
learning_rate: 0.004
batch_size: 128
mixed_precision: true

network:
  use_rh: true
  input_dim: 37
  base_channels: 32
  depth: 3
  n_auxiliary_fields: 2
  normalisation_path: data/stats/normalization_rh_aux2.json
