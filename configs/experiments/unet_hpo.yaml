# @package _global_

# Starting point for UNet hyperparameter optimization. Fixes the feature set
# (RH on, 2 auxiliary fields) and seeds a higher base learning rate, on the
# expectation that ReduceLROnPlateau will catch any overshoot. Sweep configs
# override learning_rate, weight_decay, network.base_channels, network.depth,
# lr_patience, lr_factor, batch_size on top of this.

defaults:
  - override /model: unet

exp_name: unet_hpo
learning_rate: 0.002
mixed_precision: true

network:
  use_rh: true
  input_dim: 37
  n_auxiliary_fields: 2
  normalisation_path: data/stats/normalization_rh_aux2.json
