# @package _global_

# Wind-derived features: |v|, sin(theta), cos(theta) per level (21 extra
# channels). Reuses the rh+aux2 stats JSON; wind channels are normalized as
# no-op via the model (mean=0, std=1) and rely on downstream GroupNorm. Mostly
# expected not to help on top of u, v already in the input — included to
# confirm or refute that hypothesis.

defaults:
  - override /model: unet

exp_name: unet_brute_wind
learning_rate: 0.002
batch_size: 64
mixed_precision: true

network:
  use_rh: true
  use_wind: true
  input_dim: 58  # 28 raw + 7 RH + 21 wind + 2 aux
  base_channels: 32
  depth: 3
  n_auxiliary_fields: 2
  normalisation_path: data/stats/normalization_rh_aux2.json
