# @package _global_

# Wider model: 4x params at the same depth. Smaller batch to keep memory in
# range on an L4 (24 GB).

defaults:
  - override /model: unet

exp_name: unet_brute_wide
learning_rate: 0.001
batch_size: 32
mixed_precision: true

network:
  use_rh: true
  input_dim: 37
  base_channels: 64
  depth: 3
  n_auxiliary_fields: 2
  normalisation_path: data/stats/normalization_rh_aux2.json
