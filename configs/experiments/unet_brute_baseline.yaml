# @package _global_

# Reference point: same architecture as wandb_grid's unet_rh_aux2 but pinned
# explicitly so the brute-force grid has a clean baseline to compare against.

defaults:
  - override /model: unet

exp_name: unet_brute_baseline
learning_rate: 0.002
batch_size: 64
mixed_precision: true

network:
  use_rh: true
  input_dim: 37
  base_channels: 32
  depth: 3
  n_auxiliary_fields: 2
  normalisation_path: data/stats/normalization_rh_aux2.json
