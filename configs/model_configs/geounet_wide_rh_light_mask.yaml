# @package _global_

# Always-on light masking: every sample gets one small block masked (~5-10%
# spatial coverage), with no extra loss weight. Matches the winning solution's
# "~10% input masking to reduce overfitting" philosophy — lighter and more
# consistent than the current heavy-occasional approach (p_apply=0.5,
# up to 3 blocks, 2x loss weight).

defaults:
  - override /model: geounet

exp_name: geounet_wide_rh_light_mask
learning_rate: 3e-4
n_epochs: 50
batch_size: 64
early_stop_patience: null

model:
  mask_p_apply: 1.0
  mask_n_blocks_max: 1
  mask_loss_weight: 1.0

network:
  base_dim: 128
  use_rh: true
  normalisation_path: data/stats/normalization_rh_aux0.json
