# @package _global_

# GeoUNet wide + vertical wind shear features.
# Appends 6 shear channels (sqrt(du^2+dv^2) between adjacent pressure levels)
# computed from already-normalised u/v — no new norm stats needed.

defaults:
  - override /model: geounet

exp_name: geounet_wide_shear
learning_rate: 3e-4
n_epochs: 50
batch_size: 64
early_stop_patience: null

network:
  base_dim: 128
  use_shear: true
  normalisation_path: data/stats/normalization_no_rh_aux0.json
