# @package _global_

# Wider-not-deeper variant: same base_dim as geounet_wide_rh but flat
# depth_mult [2,2,2,2] instead of [2,2,6,2]. Keeps capacity in channels
# rather than stacking more blocks at the bottleneck.

defaults:
  - override /model: geounet

exp_name: geounet_wide_rh_flat
learning_rate: 3e-4
n_epochs: 50
batch_size: 64
early_stop_patience: null

network:
  base_dim: 128
  depth_mult: [2, 2, 2, 2]
  use_rh: true
  normalisation_path: data/stats/normalization_rh_aux0.json
