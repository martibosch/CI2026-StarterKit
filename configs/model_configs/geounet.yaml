# @package _global_

# Geography-agnostic ConvNeXt U-Net, port of the CI2026 winning solution.
#
# Key design choices vs unet_brute_wide:
#   - ConvNeXt blocks with layer-scale gamma (init 1e-5)
#   - Replicate padding on all sides (regional tiles, not global wrap)
#   - Random longitude rolls + rectangular input masking on GPU during training
#   - No auxiliary geographic fields — raw T/q/u/v at 7 levels only (28 channels)
#   - Cosine LR schedule per batch with 1-epoch linear warmup
#   - Masked pixels upweighted 2x in loss
#
# Requires: data/stats/normalization_no_rh_aux0.json
# Compute with: python scripts/compute_normalization.py --n_auxiliary_fields 0 \
#   --output_path data/stats/normalization_no_rh_aux0.json

defaults:
  - override /model: geounet

exp_name: geounet
learning_rate: 3e-4
n_epochs: 40
batch_size: 64
early_stop_patience: null

network:
  normalisation_path: data/stats/normalization_no_rh_aux0.json
