# @package _global_

# GeoUNet wide + Gaussian input noise augmentation.
# Adds N(0, 0.02) noise to normalised features during training — uniform across
# channels, acts as input-space dropout to reduce train/val gap.

defaults:
  - override /model: geounet

exp_name: geounet_wide_noise
learning_rate: 3e-4
n_epochs: 50
batch_size: 64
early_stop_patience: null

network:
  base_dim: 128
  training_noise_std: 0.02
  normalisation_path: data/stats/normalization_no_rh_aux0.json
