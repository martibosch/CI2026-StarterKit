# @package _global_

# GeoUNet wide + RH with late mask annealing.

defaults:
  - override /model: geounet

exp_name: geounet_wide_rh_mask_sched
learning_rate: 3e-4
n_epochs: 50
batch_size: 64
early_stop_patience: null

model:
  mask_p_apply_schedule:
    - epoch: 1
      value: 0.5
    - epoch: 36
      value: 0.25
    - epoch: 46
      value: 0.0
  mask_loss_weight_schedule:
    - epoch: 1
      value: 2.0
    - epoch: 36
      value: 1.5
    - epoch: 46
      value: 1.0

network:
  base_dim: 128
  use_rh: true
  normalisation_path: data/stats/normalization_rh_aux0.json
