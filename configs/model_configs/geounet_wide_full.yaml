# @package _global_

# GeoUNet wide + all augmentations: lon roll, rectangular masking (defaults),
# vertical wind shear features, and Gaussian input noise.

defaults:
  - override /model: geounet

exp_name: geounet_wide_full
learning_rate: 3e-4
n_epochs: 50
batch_size: 64
early_stop_patience: null

network:
  base_dim: 128
  use_shear: true
  training_noise_std: 0.02
  normalisation_path: data/stats/normalization_no_rh_aux0.json
