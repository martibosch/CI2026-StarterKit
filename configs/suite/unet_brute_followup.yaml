# @package _global_

# Same envelope as unet_brute, but lower n_epochs cap is overridden per-
# experiment (xlarge bumps to 60). Loose early stop so wide-style models can
# train to convergence rather than being clipped at the suite default.

n_epochs: 30
early_stop_patience: 15

data:
  num_workers: 6
  prefetch_factor: 4

wandb:
  enabled: true
  project: ci2026
  entity: ${oc.env:WANDB_ENTITY,null}
  mode: online
