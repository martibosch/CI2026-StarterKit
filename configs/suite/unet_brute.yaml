# @package _global_

# Same training envelope as wandb_grid so the brute-force runs land on the
# same wandb dashboard with comparable epoch budgets and early-stop behavior.

n_epochs: 30
early_stop_patience: 10

data:
  num_workers: 6
  prefetch_factor: 4

wandb:
  enabled: true
  project: ci2026
  entity: ${oc.env:WANDB_ENTITY,null}
  mode: online
